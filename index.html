<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Request Harga Coret Bundling</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    color:#e91e63;
    margin-bottom:20px;
    text-align:center;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:bold;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    text-align:center;
}

.btn{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn-add{
    background:#2196f3;
    color:white;
    width:100%;
    margin-top:15px;
}

.btn-submit{
    background:#e91e63;
    color:white;
    width:100%;
    margin-top:20px;
}

.btn-delete{
    background:#f44336;
    color:white;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#e91e63;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.total{
    margin-top:15px;
    font-weight:bold;
    color:#e91e63;
}

.product-list{
    margin-top:20px;
}

.product-card{
    background:#fff;
    border:1px solid #eee;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.05);
    text-align:center;
}

.product-name{
    font-weight:bold;
    font-size:16px;
    color:#333;
    margin-bottom:8px;
}

.product-info{
    font-size:14px;
    margin-bottom:4px;
}

.product-action{
    text-align:center;
    margin-top:10px;
}

.loading{
    display:none;
    text-align:center;
    margin-top:15px;
    color:#e91e63;
    font-weight:bold;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-content{
    background:white;
    width:90%;
    max-width:350px;
    border-radius:20px;
    padding:25px;
    text-align:center;
    animation:popup .25s ease;
}

.modal-icon{
    font-size:50px;
    margin-bottom:10px;
}

.modal-content h2{
    margin-bottom:10px;
    color:#e91e63;
}

.modal-content p{
    margin-bottom:20px;
}

.modal-btn{
    border:none;
    background:#25D366;
    color:white;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    width:100%;
}

@keyframes popup{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
    
@media(max-width:768px){

table{
    display:block;
    overflow-x:auto;
}

}

.loader{
    width:50px;
    height:50px;
    border:5px solid #eee;
    border-top:5px solid #e91e63;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Request Harga Coret Event</h1>

<label>Nama PIC</label>
<input type="text" id="pic">

<hr style="margin:20px 0">

<label>Nama Produk</label>
<input type="text" id="produk">

<label>Harga Coret</label>
<input
    type="text"
    id="coret"
    inputmode="numeric"
    pattern="[0-9]*"
    oninput="formatInputRupiah(this)">

<label>Harga Promo</label>
<input
    type="text"
    id="promo"
    inputmode="numeric"
    pattern="[0-9]*"
    oninput="formatInputRupiah(this)">

<label>Qty Price Tag (Mau buat berapa?)</label>
<input type="number" id="qty" value="1" min="1">

<button class="btn btn-add" onclick="tambahProduk()">
+ Tambah Produk
</button>

<div id="listProduk" class="product-list"></div>

<div class="total">
Total Item : <span id="totalItem">0</span>
</div>

<button class="btn btn-submit" onclick="kirimData()">
📤 Kirim Data Price Tag
</button>

</div>

</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxs_9L3SxWN2sgzs-_AYZ4P2d_GhFd2Bt-hVTmZfHtq3S4NUB7b6VYAlcCRpDuXg7ro/exec";

let items = [];

function formatRupiah(angka){

return Number(angka).toLocaleString('id-ID');

}

function tambahProduk(){

const produk = document.getElementById("produk").value.trim();
const coret = document.getElementById("coret").value;
const promo = document.getElementById("promo").value;
const qty = document.getElementById("qty").value;

if(!produk){
    alert("Nama produk wajib diisi");
    return;
}

if(!promo){
    alert("Harga promo wajib diisi");
    return;
}

items.push({
    namaProduk: produk,
    hargaCoret: coret.replace(/\./g,'') || 0,
    hargaPromo: promo.replace(/\./g,''),
    qty: qty || 1
});

renderTable();

document.getElementById("produk").value = "";
document.getElementById("coret").value = "";
document.getElementById("promo").value = "";
document.getElementById("qty").value = 1;

document.getElementById("produk").focus();

}

function renderTable(){

const list = document.getElementById("listProduk");

list.innerHTML = "";

items.forEach((item,index)=>{

list.innerHTML += `
<div class="product-card">

    <div class="product-name">
        ${item.namaProduk}
    </div>

    <div class="product-info">
        Harga Coret : Rp ${formatRupiah(item.hargaCoret)}
    </div>

    <div class="product-info">
        Harga Promo : Rp ${formatRupiah(item.hargaPromo)}
    </div>

    <div class="product-info">
        Qty : ${item.qty}
    </div>

    <div class="product-action">
        <button class="btn-delete"
        onclick="hapusItem(${index})">
        Hapus
        </button>
    </div>

</div>
`;

});

document.getElementById("totalItem").innerText =
items.length;

}

function hapusItem(index){

items.splice(index,1);

renderTable();

}

async function kirimData(){

const pic = document.getElementById("pic").value.trim();

if(!pic){
    alert("Nama PIC wajib diisi");
    return;
}

if(items.length===0){
    alert("Belum ada produk");
    return;
}

document.getElementById("loadingModal").style.display="flex";

try{

const response = await fetch(WEBAPP_URL,{
method:"POST",
redirect:"follow",
body:JSON.stringify({
    pic:pic,
    items:items
})
});

const text = await response.text();

console.log(text);

let result;

try{
    result = JSON.parse(text);
}catch{
    throw new Error("Response bukan JSON : " + text);
}

if(result.success){

    const totalProduk = items.length;

const pesan =
`Awil, minta tolong cetak harga coret\n`+
`PIC : ${pic}\n`+
`Jumlah Produk : ${totalProduk}`;

document.getElementById("successModal").style.display = "flex";

document.getElementById("waBtn").onclick = function(){

    window.open(
  `https://api.whatsapp.com/send?phone=6283877710233&text=${encodeURIComponent(pesan)}`,
  "_blank"
);

    document.getElementById("successModal").style.display = "none";
};

    items = [];

    renderTable();

}else{

    alert(result.error || "Gagal mengirim data");

}

}catch(err){

console.error(err);

alert("Error : " + err.message);

}

document.getElementById("loadingModal").style.display="none";

}

function formatInputRupiah(input){

    let angka = input.value.replace(/\D/g,'');

    input.value = angka.replace(/\B(?=(\d{3})+(?!\d))/g,'.');

}
</script>

<div id="successModal" class="modal">

  <div class="modal-content">

      <div class="modal-icon">✅</div>

      <h2>Berhasil</h2>

      <p>
  Data Harga Coret berhasil dikirim dan siap diproses.<br><br>
  Klik <b>OK</b> untuk mengirim notifikasi ke admin melalui WhatsApp.
</p>

      <button id="waBtn" class="modal-btn">
        OK
      </button>

  </div>

</div>

<div id="loadingModal" class="modal">

  <div class="modal-content">

      <div class="loader"></div>

      <h3 style="margin-top:15px;">
        Mengirim Data...
      </h3>

      <p>
        Mohon tunggu sebentar
      </p>

  </div>

</div>
    
</body>
</html>
